<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>John McKenney – Cybersecurity Contact Card</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');
 
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    background: #020b14;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
  }
 
  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,180,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,180,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridPulse 8s ease-in-out infinite;
    z-index: 0;
  }
 
  @keyframes gridPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
 
  /* Scan line */
  body::after {
    content: '';
    position: fixed;
    top: -100%;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #00ffb4, #00e5ff, #00ffb4, transparent);
    animation: scanLine 5s linear infinite;
    z-index: 1;
    opacity: 0.6;
  }
 
  @keyframes scanLine {
    0% { top: -2%; }
    100% { top: 102%; }
  }
 
  .card-wrapper {
    position: relative;
    z-index: 2;
    animation: cardReveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
  }
 
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
 
  .card {
    position: relative;
    width: 680px;
    background: linear-gradient(145deg, #051220 0%, #030d1a 50%, #061828 100%);
    border: 1px solid rgba(0,255,180,0.25);
    border-radius: 2px;
    padding: 48px 52px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(0,229,255,0.08),
      0 0 60px rgba(0,255,180,0.06),
      0 30px 80px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(0,255,180,0.15);
  }
 
  /* Corner brackets */
  .card::before, .card::after,
  .card-corner-br, .card-corner-tl {
    content: '';
    position: absolute;
    width: 22px;
    height: 22px;
    border-color: #00ffb4;
    border-style: solid;
  }
  .card::before {
    top: 12px; left: 12px;
    border-width: 2px 0 0 2px;
  }
  .card::after {
    top: 12px; right: 12px;
    border-width: 2px 2px 0 0;
  }
  .card-corner-br {
    bottom: 12px; right: 12px;
    border-width: 0 2px 2px 0;
  }
  .card-corner-tl {
    bottom: 12px; left: 12px;
    border-width: 0 0 2px 2px;
  }
 
  /* Diagonal accent line */
  .diagonal-line {
    position: absolute;
    top: 0; right: 80px;
    width: 1px;
    height: 100%;
    background: linear-gradient(180deg, transparent 0%, rgba(0,255,180,0.12) 30%, rgba(0,229,255,0.18) 70%, transparent 100%);
    transform: skewX(-8deg);
    transform-origin: top;
  }
 
  /* Glow orb */
  .glow-orb {
    position: absolute;
    top: -120px;
    right: -80px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(0,229,255,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
 
  /* Header section */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 36px;
    animation: fadeUp 0.8s 0.3s cubic-bezier(0.16,1,0.3,1) both;
  }
 
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
 
  .identity {
    flex: 1;
  }
 
  .status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #00ffb4;
    text-transform: uppercase;
  }
 
  .status-dot {
    width: 6px;
    height: 6px;
    background: #00ffb4;
    border-radius: 50%;
    box-shadow: 0 0 8px #00ffb4;
    animation: blink 2s ease-in-out infinite;
  }
 
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
 
  .name {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 32px;
    letter-spacing: 0.04em;
    line-height: 1.1;
    color: #f0fbff;
    text-shadow: 0 0 30px rgba(0,229,255,0.3);
    margin-bottom: 6px;
  }
 
  .name span {
    color: #00e5ff;
  }
 
  .title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    font-size: 15px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(200,230,240,0.6);
    margin-bottom: 4px;
  }
 
  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    animation: fadeUp 0.8s 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }
 
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(0,255,180,0.5), rgba(0,229,255,0.2), transparent);
  }
 
  .divider-icon {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: rgba(0,255,180,0.5);
    letter-spacing: 0.1em;
  }
 
  /* Specializations */
  .specializations {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 36px;
    animation: fadeUp 0.8s 0.55s cubic-bezier(0.16,1,0.3,1) both;
  }
 
  .spec-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border: 1px solid rgba(0,229,255,0.3);
    color: #00e5ff;
    background: rgba(0,229,255,0.06);
    text-transform: uppercase;
    position: relative;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: all 0.3s ease;
  }
 
  .spec-tag:hover {
    background: rgba(0,229,255,0.14);
    border-color: rgba(0,229,255,0.7);
    box-shadow: 0 0 14px rgba(0,229,255,0.2);
    color: #fff;
  }
 
  /* Main content row */
  .main-row {
    display: flex;
    gap: 36px;
    align-items: flex-start;
    animation: fadeUp 0.8s 0.65s cubic-bezier(0.16,1,0.3,1) both;
  }
 
  /* QR section */
  .qr-section {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
 
  .qr-frame {
    position: relative;
    padding: 10px;
    background: #f8fcff;
    border: 1px solid rgba(0,255,180,0.3);
    box-shadow:
      0 0 0 1px rgba(0,229,255,0.15),
      0 0 20px rgba(0,255,180,0.1),
      inset 0 0 20px rgba(0,229,255,0.04);
    border-radius: 2px;
  }
 
  .qr-frame::before, .qr-frame::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
  }
  .qr-frame::before {
    top: -1px; left: -1px;
    border-top: 2px solid #00ffb4;
    border-left: 2px solid #00ffb4;
  }
  .qr-frame::after {
    bottom: -1px; right: -1px;
    border-bottom: 2px solid #00ffb4;
    border-right: 2px solid #00ffb4;
  }
 
  .qr-frame img {
    display: block;
    width: 148px;
    height: 148px;
    image-rendering: pixelated;
  }
 
  .qr-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    color: rgba(0,255,180,0.6);
    text-transform: uppercase;
    text-align: center;
  }
 
  /* Info section */
  .info-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding-top: 4px;
  }
 
  .portfolio-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: rgba(200,225,240,0.55);
    text-transform: uppercase;
    margin-bottom: -6px;
  }
 
  .portfolio-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: rgba(240,248,255,0.9);
    line-height: 1.3;
  }
 
  .contact-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border: 1px solid rgba(0,229,255,0.15);
    background: rgba(0,229,255,0.03);
    position: relative;
    transition: all 0.3s ease;
    text-decoration: none;
  }
 
  .contact-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, #00ffb4, #00e5ff);
  }
 
  .contact-item:hover {
    background: rgba(0,229,255,0.08);
    border-color: rgba(0,229,255,0.4);
    box-shadow: 0 0 20px rgba(0,229,255,0.08);
  }
 
  .contact-icon {
    font-size: 15px;
    flex-shrink: 0;
  }
 
  .contact-details {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
 
  .contact-platform {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: #00ffb4;
    text-transform: uppercase;
  }
 
  .contact-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: rgba(200,230,250,0.85);
  }
 
  /* Footer */
  .card-footer {
    margin-top: 30px;
    padding-top: 16px;
    border-top: 1px solid rgba(0,255,180,0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: fadeUp 0.8s 0.75s cubic-bezier(0.16,1,0.3,1) both;
  }
 
  .footer-id {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: rgba(0,255,180,0.3);
    text-transform: uppercase;
  }
 
  .footer-tagline {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: rgba(0,229,255,0.25);
    text-transform: uppercase;
  }
</style>
</head>
